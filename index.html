<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">
    <header>
      <h1 class="title">TIC<span>TAC</span>TOE</h1>
      <p class="subtitle">Two player battle</p>
    </header>

    <div class="scoreboard">
      <div class="score-card" id="score-x">
        <span class="player-symbol x-color">X</span>
        <span class="player-label">Player X</span>
        <span class="score-num" id="score-x-num">0</span>
      </div>
      <div class="score-card draws">
        <span class="player-symbol draw-color">—</span>
        <span class="player-label">Draws</span>
        <span class="score-num" id="score-draw-num">0</span>
      </div>
      <div class="score-card" id="score-o">
        <span class="player-symbol o-color">O</span>
        <span class="player-label">Player O</span>
        <span class="score-num" id="score-o-num">0</span>
      </div>
    </div>

    <div class="turn-banner">
      <div class="turn-indicator">
        <span id="turn-symbol" class="turn-sym x-color">X</span>
        <span id="turn-text">Player X's Turn</span>
      </div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="result-banner" id="result-banner">
      <span id="result-text"></span>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="reset-btn">New Game</button>
      <button class="btn btn-secondary" id="clear-score-btn">Clear Scores</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
